# Optimized Training Configuration for Load Prediction Model

# Model architecture - slightly larger for better capacity
model:
  input_size: 4
  hidden_size: 128         # Increased from 64
  num_layers: 2
  output_size: 5
  dropout: 0.3             # Increased for regularization
  bidirectional: true
  use_attention: true

# Data settings
data:
  lookback: 15             # Increased from 10 for more context
  horizon: 5
  target_col: 0
  train_ratio: 0.7
  val_ratio: 0.15

# Training settings - more aggressive
training:
  batch_size: 64           # Larger batch for stability
  learning_rate: 0.0005    # Lower for smoother convergence
  weight_decay: 0.0001
  epochs: 200              # More epochs
  patience: 20             # More patience

# Scheduler settings
scheduler:
  type: reduce_on_plateau
  factor: 0.5
  patience: 10

# Paths
paths:
  data_dir: data/training
  model_save: models/lstm_predictor.pt
  tensorboard_dir: runs/prediction

# Logging
logging:
  log_interval: 20
  save_best_only: true
